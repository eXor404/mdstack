name: Build and Deploy Website

on:
  push:
    tags: [ 'web-v*' ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/website
  CONTAINER_NAME: mdstack-web
  HOST_PORT: 3003
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Install root deps (needed by mdstack CLI for theme previews)
        run: npm ci

      - name: Install website deps
        working-directory: website
        run: npm ci

      - name: Build website
        working-directory: website
        run: npm run build

      - name: Log in to the Container registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=tag
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: ./website
          file: ./website/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Set lower case image name
        run: |
          echo "IMAGE_NAME_LC=${GITHUB_REPOSITORY,,}/website" >> $GITHUB_ENV

      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            mkdir -p /tmp/docker-deploy-web
            echo "${{ secrets.GITHUB_TOKEN }}" | docker --config /tmp/docker-deploy-web login ghcr.io -u ${{ github.actor }} --password-stdin 2>/dev/null

            if [ "$(docker ps -aq -f name=${{ env.CONTAINER_NAME }})" ]; then
                docker stop ${{ env.CONTAINER_NAME }} > /dev/null
                docker rm ${{ env.CONTAINER_NAME }} > /dev/null
            fi

            docker --config /tmp/docker-deploy-web pull ghcr.io/${{ env.IMAGE_NAME_LC }}:${{ github.ref_name }}
            docker run -d --name ${{ env.CONTAINER_NAME }} -p ${{ env.HOST_PORT }}:80 --restart always ghcr.io/${{ env.IMAGE_NAME_LC }}:${{ github.ref_name }}

            docker image prune -f
            docker --config /tmp/docker-deploy-web logout ghcr.io
            rm -rf /tmp/docker-deploy-web
