<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff0080"/>
      <stop offset="50%" stop-color="#ff4500"/>
      <stop offset="100%" stop-color="#ffa500"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="20%" r="60%">
      <stop offset="0%" stop-color="#ff4500" stop-opacity="0.20"/>
      <stop offset="60%" stop-color="#ff0080" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#0d0d0d" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="#0d0d0d"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Logomark -->
  <g transform="translate(80,80)">
    <rect width="80" height="80" rx="20" fill="url(#grad)"/>
    <rect x="11" y="11" width="58" height="58" rx="11" fill="#0d0d0d"/>
    <path d="M40 18 L62 40 L40 62 L18 40 Z" fill="url(#grad)"/>
  </g>

  <!-- Wordmark -->
  <text x="180" y="138"
        font-family="-apple-system, BlinkMacSystemFont, 'Inter', system-ui, sans-serif"
        font-size="48" font-weight="700"
        fill="#e5e5e5" letter-spacing="-1">mdstack</text>

  <!-- Pre-1.0 chip -->
  <g transform="translate(440,108)">
    <rect width="170" height="32" rx="16" fill="#1a1a1c" stroke="rgba(255,255,255,0.16)"/>
    <circle cx="14" cy="16" r="4" fill="url(#grad)"/>
    <text x="26" y="21"
          font-family="-apple-system, 'Inter', system-ui, sans-serif"
          font-size="13" font-weight="500"
          fill="#9ca3af">pre-1.0 · provisional</text>
  </g>

  <!-- Hero h1 -->
  <text x="80" y="320"
        font-family="-apple-system, BlinkMacSystemFont, 'Inter', system-ui, sans-serif"
        font-size="92" font-weight="800"
        fill="#e5e5e5" letter-spacing="-2.5">Drop a folder of <tspan fill="url(#grad)">markdown</tspan>.</text>
  <text x="80" y="420"
        font-family="-apple-system, BlinkMacSystemFont, 'Inter', system-ui, sans-serif"
        font-size="92" font-weight="800"
        fill="#e5e5e5" letter-spacing="-2.5">Get a site.</text>

  <!-- Sub line -->
  <text x="80" y="490"
        font-family="-apple-system, BlinkMacSystemFont, 'Inter', system-ui, sans-serif"
        font-size="28" font-weight="500"
        fill="#9ca3af">Zero-config static-site CLI. Dev, build, deploy. Four themes.</text>

  <!-- Command pill -->
  <g transform="translate(80,540)">
    <rect width="640" height="56" rx="10" fill="#0a0a0b" stroke="url(#grad)" stroke-width="2"/>
    <text x="22" y="36"
          font-family="'JetBrains Mono', 'SF Mono', Menlo, monospace"
          font-size="20" font-weight="500"
          fill="#6b7280">$</text>
    <text x="50" y="36"
          font-family="'JetBrains Mono', 'SF Mono', Menlo, monospace"
          font-size="20" font-weight="500"
          fill="#e5e5e5">npx @exor404/mdstack ./docs</text>
  </g>

  <!-- Bottom hairline -->
  <rect x="0" y="624" width="1200" height="6" fill="url(#grad)"/>
</svg>
