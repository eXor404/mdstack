<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 360" role="img" aria-label="mdstack sample image">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff0080"/>
      <stop offset="50%" stop-color="#ff4500"/>
      <stop offset="100%" stop-color="#ffa500"/>
    </linearGradient>
    <linearGradient id="g2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a1c"/>
      <stop offset="100%" stop-color="#0d0d0d"/>
    </linearGradient>
  </defs>

  <rect width="800" height="360" fill="url(#g2)"/>

  <g transform="translate(60, 90)">
    <rect x="0" y="0" width="180" height="180" rx="28" fill="url(#g)"/>
    <rect x="22" y="22" width="136" height="136" rx="14" fill="#0d0d0d"/>
    <polygon points="90,46 134,90 90,134 46,90" fill="url(#g)"/>
  </g>

  <g transform="translate(290, 120)" font-family="-apple-system, 'Inter', system-ui, sans-serif" fill="#e5e5e5">
    <text x="0" y="0" font-size="48" font-weight="700" letter-spacing="-1">mdstack</text>
    <text x="0" y="38" font-size="18" fill="#9ca3af" font-weight="500">Drop a folder of markdown files,</text>
    <text x="0" y="64" font-size="18" fill="#9ca3af" font-weight="500">get a rendered site.</text>
    <g transform="translate(0, 100)">
      <rect x="0" y="0" width="160" height="34" rx="8" fill="#1f1f22" stroke="rgba(255,255,255,0.16)"/>
      <text x="14" y="22" font-size="13" font-family="'JetBrains Mono', Menlo, monospace" fill="#e5e5e5">npx mdstack ./docs</text>
    </g>
  </g>
</svg>
